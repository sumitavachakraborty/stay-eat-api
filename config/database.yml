default: &default
  adapter: postgresql
  encoding: unicode
  host: <%= ENV.fetch("DATABASE_HOST", "localhost") %>
  port: <%= ENV.fetch("DATABASE_PORT", 5432) %>
  username: <%= ENV.fetch("DATABASE_USER", "postgres") %>
  password: <%= ENV.fetch("DATABASE_PASSWORD", "postgres") %>
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>
  timeout: 5000

development:
  <<: *default
  database: stay_and_eat_development

test:
  <<: *default
  database: stay_and_eat_test

production:
  <<: *default
  database: stay_and_eat_production
  # When DATABASE_URL is set it overrides the above — Rails merges it in automatically.
  # DATABASE_URL example: postgres://user:pass@host:5432/stay_and_eat_production
